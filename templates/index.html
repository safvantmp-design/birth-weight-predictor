<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birth Weight Predictor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-top: 40px;
    }

    form {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      width: 300px;
      margin-top: 60px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #2575fc;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #2575fc;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #6a11cb;
    }
  </style>
</head>
<body>
  <div>
    <h1>Birth Weight of your child</h1>
    <form action="/predict" method="POST">
      <label>Gestation</label>
      <input name="gestation" type="number">

      <label>Parity</label>
      <input name="parity" type="number">

      <label>Age</label>
      <input name="age" type="number">

      <label>Height</label>
      <input name="height" type="number">

      <label>Weight</label>
      <input name="weight" type="number">

      <label>Smoke</label>
      <input name="smoke" type="number">

      <button type="submit">Predict Birth Weight</button>
    </form>
    <h3>predicted birth weight:{{ prediction }}</h3>
  </div>
</body>
</html>
